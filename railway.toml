# railway.toml — PantheonMed AI Frontend
# Docs: https://docs.railway.app/reference/config-as-code

[build]
# Use the Dockerfile at the repo root
builder      = "DOCKERFILE"
dockerfilePath = "Dockerfile"

# NEXT_PUBLIC_* vars are baked into the JS bundle at build time.
# Set NEXT_PUBLIC_API_URL and NEXT_PUBLIC_API_TOKEN in Railway's
# "Variables" tab; they are forwarded here as Docker build-args.
[build.args]
NEXT_PUBLIC_API_URL   = "${{NEXT_PUBLIC_API_URL}}"
NEXT_PUBLIC_API_TOKEN = "${{NEXT_PUBLIC_API_TOKEN}}"

[deploy]
# Next.js standalone entry point (matches the runner stage CMD)
startCommand       = "node server.js"
healthcheckPath    = "/"
healthcheckTimeout = 300

[deploy.restartPolicy]
type       = "ON_FAILURE"
maxRetries = 3
