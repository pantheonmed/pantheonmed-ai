# ══════════════════════════════════════════════════════════════════════════════
# PantheonMed AI — Production Docker Compose Overlay
# ══════════════════════════════════════════════════════════════════════════════
# This file is an OVERLAY on top of docker-compose.yml.
# Always run both together:
#
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Prerequisites:
#   - .env file with all [REQUIRED] variables set
#   - TLS certificates obtained (see PRODUCTION_SETUP.md)
#   - Ports 80 and 443 open in your firewall
# ══════════════════════════════════════════════════════════════════════════════

version: "3.9"

services:

  # ── Nginx Reverse Proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: pantheonmed_nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
      - ./backend/uploads:/app/uploads:ro
    environment:
      - DOMAIN=${DOMAIN}
    # Reload config without downtime
    command: >
      sh -c "envsubst '$$DOMAIN' < /etc/nginx/conf.d/pantheonmed.conf
             > /etc/nginx/conf.d/default.conf
             && nginx -g 'daemon off;'"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - pantheonmed_net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  # ── Certbot (TLS certificate management) ────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: pantheonmed_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    # Renew certificates twice daily (certbot only renews when <30 days left)
    entrypoint: >
      sh -c "trap exit TERM;
             while :; do
               certbot renew --webroot -w /var/www/certbot --quiet;
               sleep 12h & wait $${!};
             done"
    networks:
      - pantheonmed_net

  # ── PostgreSQL (production hardening) ───────────────────────────────────────
  db:
    # Remove dev port exposure — only accessible inside the Docker network
    ports: !reset []
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Connection pooling settings for production load
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.utf8"
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=768MB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c log_min_duration_statement=1000
      -c log_checkpoints=on
      -c log_connections=on
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G

  # ── Redis (production hardening) ─────────────────────────────────────────────
  redis:
    # Remove dev port exposure
    ports: !reset []
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 300 100
      --save 60 10000
      --appendonly yes
      --appendfsync everysec
      --no-appendfsync-on-rewrite yes
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 640M

  # ── FastAPI Backend (production settings) ────────────────────────────────────
  backend:
    # Remove dev port exposure — only accessible via Nginx
    ports: !reset []
    environment:
      ENV: production
      DEBUG: "false"
      # Use Gunicorn with Uvicorn workers for true multi-process concurrency
      LOG_FORMAT: json
    # Gunicorn with uvicorn workers: (2 * CPU_COUNT) + 1 workers is the rule
    # Adjust --workers based on your server's CPU count
    command: >
      gunicorn app.main:app
      --worker-class uvicorn.workers.UvicornWorker
      --workers 4
      --bind 0.0.0.0:8000
      --timeout 120
      --keepalive 5
      --max-requests 1000
      --max-requests-jitter 100
      --access-logfile -
      --error-logfile -
      --log-level info
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  # ── Next.js Frontend (production settings) ───────────────────────────────────
  frontend:
    # Remove dev port exposure — only accessible via Nginx
    ports: !reset []
    environment:
      NODE_ENV: production
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 256M

volumes:
  # Existing volumes from base compose
  postgres_data:
  redis_data:

  # New: TLS certificate storage
  certbot_conf:
    driver: local
  certbot_www:
    driver: local

networks:
  pantheonmed_net:
    driver: bridge
