version: "3.9"

# ══════════════════════════════════════════════════════════════════════════════
# PantheonMed AI — Docker Compose
# ══════════════════════════════════════════════════════════════════════════════
# Usage:
#   Development:   docker compose up
#   Production:    docker compose -f docker-compose.yml -f docker-compose.prod.yml up
#   Stop:          docker compose down
#   Reset DB:      docker compose down -v
# ══════════════════════════════════════════════════════════════════════════════

services:

  # ── PostgreSQL Database ─────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: pantheonmed_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: pantheon
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pantheon_dev_2024}
      POSTGRES_DB: pantheonmed
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pantheon -d pantheonmed"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - pantheonmed_net

  # ── Redis (Rate limiting + Caching) ────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: pantheonmed_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis_dev_2024}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_dev_2024}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - pantheonmed_net

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pantheonmed_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # App
      ENV: ${ENV:-development}
      DEBUG: ${DEBUG:-true}
      # Database
      DATABASE_URL: postgresql+asyncpg://pantheon:${POSTGRES_PASSWORD:-pantheon_dev_2024}@db:5432/pantheonmed
      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_dev_2024}@redis:6379/0
      # Security — MUST be overridden in production
      JWT_SECRET: ${JWT_SECRET:-CHANGE-ME-IN-PRODUCTION-USE-64-CHAR-RANDOM-STRING-HERE}
      # AI Providers — set in .env
      AI_PROVIDER: ${AI_PROVIDER:-gemini}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-1.5-flash}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-haiku-4-5-20251001}
      # CORS — set for production
      ALLOWED_ORIGINS_PROD: ${ALLOWED_ORIGINS_PROD:-}
      # Admin credentials
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@pantheonmed.ai}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-ChangeMe123!}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - pantheonmed_net

  # ── Next.js Frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./pantheonmed-ai-frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: pantheonmed_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - pantheonmed_net

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  pantheonmed_net:
    driver: bridge
