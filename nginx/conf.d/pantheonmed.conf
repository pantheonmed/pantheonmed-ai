# ══════════════════════════════════════════════════════════════════════════════
# PantheonMed AI — Nginx Production Configuration
# ══════════════════════════════════════════════════════════════════════════════
# Serves:
#   /       → Next.js frontend (port 3000)
#   /api/   → FastAPI backend  (port 8000)
#   /docs   → FastAPI Swagger  (blocked in production)
# ══════════════════════════════════════════════════════════════════════════════

# ── Upstream Definitions ──────────────────────────────────────────────────────
upstream backend {
    server backend:8000;
    keepalive 32;
}

upstream frontend {
    server frontend:3000;
    keepalive 16;
}

# ── Rate Limiting Zones ───────────────────────────────────────────────────────
# General API: 30 req/s per IP
limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
# AI endpoints: 5 req/s per IP (more expensive)
limit_req_zone $binary_remote_addr zone=api_ai:10m     rate=5r/s;
# Auth endpoints: 2 req/s per IP (brute-force protection)
limit_req_zone $binary_remote_addr zone=api_auth:10m   rate=2r/s;

# ── HTTP → HTTPS Redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Let's Encrypt ACME challenge (certbot webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS Main Server ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ${DOMAIN};

    # ── TLS (managed by Certbot) ──────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security Headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header X-Frame-Options           "DENY"                                         always;
    add_header X-XSS-Protection          "1; mode=block"                                always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()"     always;
    # CSP — tighten further based on your actual CDN/font sources
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https:;" always;

    # ── Compression ───────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # ── Request Size ──────────────────────────────────────────────────────────
    client_max_body_size 25M;

    # ── Block Swagger/ReDoc in production ─────────────────────────────────────
    location ~ ^/(docs|redoc|openapi.json) {
        return 404;
    }

    # ── API Routes → FastAPI backend ──────────────────────────────────────────
    location /api/ {
        limit_req zone=api_general burst=60 nodelay;

        proxy_pass         http://backend/;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
        proxy_connect_timeout 10s;

        # Remove /api prefix before forwarding
        rewrite ^/api/(.*) /$1 break;
    }

    # ── AI-heavy endpoints (stricter rate limit) ──────────────────────────────
    location ~ ^/api/(chat|clinic|reports|symptom-assessment) {
        limit_req zone=api_ai burst=10 nodelay;

        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Longer timeout for AI streaming responses
        proxy_read_timeout  180s;
    }

    # ── Auth endpoints (brute-force protection) ────────────────────────────────
    location /api/auth/login {
        limit_req zone=api_auth burst=5 nodelay;

        proxy_pass         http://backend/auth/login;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Static file uploads (served directly by Nginx) ────────────────────────
    location /uploads/ {
        alias /app/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        # Disallow execution of uploaded files
        location ~* \.(php|py|sh|rb|pl)$ { deny all; }
    }

    # ── Health check (no rate limit, no auth) ─────────────────────────────────
    location /health {
        proxy_pass http://backend/health;
        access_log off;
    }

    # ── Next.js Frontend (everything else) ────────────────────────────────────
    location / {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Next.js HMR websocket (dev) — no-op in prod but harmless
        proxy_read_timeout 60s;
    }

    # ── Deny hidden files ─────────────────────────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }
}
